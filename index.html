<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial; padding: 20px; }
        
        /* AFFORDANCE - Blue border */
        #actionBtn {
            padding: 10px 20px;
            border: 3px solid #007bff; /* Blue */
            background: white;
            cursor: pointer;
        }
        
        /* MAPPING - Green border */
        #status {
            margin-top: 10px;
            border: 3px solid #28a745; /* Green */
            padding: 10px;
            min-height: 20px;
        }
        
        /* FEEDBACK - Yellow background on click */
        .click-feedback {
            background-color: #ffc107 !important; /* Yellow */
            transform: scale(0.95);
        }
        
        /* CONSTRAINT - Red border when disabled */
        .constrained {
            border-color: #dc3545 !important; /* Red */
        }
        
        /* SIGNIFIER - Purple background when disabled */
        .disabled-signifier {
            background-color: #6f42c1 !important; /* Purple */
            color: white;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <h3>HCI Principles Demo (Colored for Visibility)</h3>
    
    <button id="actionBtn" onclick="performAction()">
        Process Data (Click me!)
    </button>
    
    <div id="status">Status will appear here</div>
    
    <script>
        let count = 0;
        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('status');
        
        function performAction() {
            count++;
            
            // FEEDBACK: Add yellow click effect
            btn.classList.add('click-feedback');
            setTimeout(() => btn.classList.remove('click-feedback'), 2000);
            
            // Update status with count
            status.textContent = `✅ Processed ${count} time${count !== 1 ? 's' : ''}`;
            
            // CONSTRAINT & SIGNIFIER: Apply at limit
            if (count >= 3) {
                btn.disabled = true;
                btn.classList.add('constrained', 'disabled-signifier');
                status.textContent = '⛔ Limit reached (3 clicks max)';
                status.style.borderColor = '#dc3545'; // Red for constraint
            }
        }
    </script>
</body>
</html>
